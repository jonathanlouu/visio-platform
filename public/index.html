<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Visio Technique</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  .logo {
    width: 52px; height: 52px;
    background: #1a4f8a;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
  }
  .logo svg { width: 28px; height: 28px; fill: white; }
  h1 {
    text-align: center;
    font-size: 20px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 6px;
  }
  .subtitle {
    text-align: center;
    color: #666;
    font-size: 14px;
    margin-bottom: 32px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #444;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 18px;
  }
  input:focus { border-color: #1a4f8a; }
  button {
    width: 100%;
    padding: 13px;
    background: #1a4f8a;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #153d6e; }
  .error {
    background: #fef2f2;
    border: 1px solid #fca5a5;
    color: #dc2626;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 18px;
    text-align: center;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
  </div>
  <h1>Visio Technique</h1>
  <p class="subtitle">Connectez-vous pour accéder à la plateforme</p>

  <form method="POST" action="/login">
    <div id="error-msg" class="error" style="display:none">Identifiants incorrects</div>
    <label for="username">Identifiant</label>
    <input type="text" id="username" name="username" autocomplete="username" autofocus required>
    <label for="password">Mot de passe</label>
    <input type="password" id="password" name="password" autocomplete="current-password" required>
    <button type="submit">Se connecter</button>
  </form>
</div>

<script>
  if (new URLSearchParams(location.search).get('error')) {
    document.getElementById('error-msg').style.display = 'block';
  }
</script>
</body>
</html>
